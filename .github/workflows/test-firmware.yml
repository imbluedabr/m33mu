name: test-firmware

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libtpms-dev vde2 libcapstone-dev libwolfssl-dev libvdeplug-dev vde-switch libdw-dev libelf-dev
          sudo apt-get install -y gcc-arm-none-eabi
      - name: Configure
        run: cmake -S . -B build
      - name: Build m33mu
        run: cmake --build build
      - name: Fetch wolfSSL source tree for firmware build
        # The firmware Makefile (tests/firmware/test-stm32h563-wolfssl-iotsafe)
        # compiles wolfSSL .c sources directly with arm-none-eabi-gcc and
        # expects a sibling checkout at WOLFSSL_ROOT=../../../../wolfssl.
        # Match the host wolfssl version we link against (libwolfssl-dev:
        # 5.9.1-stable on ubuntu-latest).
        working-directory: ..
        run: git clone --depth 1 --branch v5.9.1-stable https://github.com/wolfSSL/wolfssl.git
      - name: Build firmware
        run: cmake --build build --target firmware-build
      - name: Run STM32H5 firmware test (SPI peripherals selection)
        run: build/m33mu tests/firmware/test-stm32h563/app.bin --spiflash:SPI1:file=/tmp/flash.bin:size=4096:mmap=0x60000000:cs=PB0 --tpm:SPI1:cs=PB1 --uart-stdout --expect-bkpt 0x7f --timeout 60 --quit-on-faults
      - name: Run STM32H5 dual-bank firmware test
        run: build/m33mu tests/firmware/test-stm32h563-dualbank/app.bin --dualbank --expect-bkpt 0x7f --timeout 60 --uart-stdout --quit-on-faults
      - name: Run STM32H5 wolfSSL IoTSAFE mTLS firmware test
        run: |
          set -euo pipefail
          rm -f /tmp/m33mu-iotsafe-sim.bin
          build/m33mu \
            --cpu stm32h563 \
            --uart-stdout \
            --expect-bkpt 0x42 \
            --timeout 20 \
            --quit-on-faults \
            --iotsafe-uart:0x40004800:file=/tmp/m33mu-iotsafe-sim.bin \
            tests/firmware/test-stm32h563-wolfssl-iotsafe/app.bin | tee /tmp/m33mu-iotsafe.log
          grep -q "IOTSAFE TEST SUCCESSFUL" /tmp/m33mu-iotsafe.log

      - name: Run STM32U5 firmware test (SPI peripherals selection)
        run: build/m33mu  tests/firmware/test-stm32u585/app.bin --spiflash:SPI1:file=/tmp/flash.bin:size=4096:mmap=0x60000000:cs=PB0 --tpm:SPI1:cs=PB1 --expect-bkpt 0x7f --timeout 60 --uart-stdout --cpu stm32u585 --quit-on-faults
      - name: Run STM32L5 firmware test (SPI peripherals selection)
        run: build/m33mu  tests/firmware/test-stm32l552/app.bin --spiflash:SPI1:file=/tmp/flash.bin:size=4096:mmap=0x60000000:cs=PB0 --tpm:SPI1:cs=PB1 --expect-bkpt 0x7f --timeout 60 --uart-stdout --cpu stm32l552 --quit-on-faults
      - name: Run nRF5340 firmware test (SPI flash read/write)
        run: build/m33mu  tests/firmware/test-nrf5340/app.bin --spiflash:SPI0:file=/tmp/flash.bin:size=4096:mmap=0x60000000:cs=PB0 --expect-bkpt 0x7f --timeout 60 --uart-stdout --cpu nrf5340 --quit-on-faults
      - name: Run nRF54LM20 firmware test
        run: build/m33mu  tests/firmware/test-nrf54lm20/app.bin --expect-bkpt 0x7f --timeout 60 --uart-stdout --cpu nrf54lm20 --quit-on-faults
      - name: Run STM32H5 firmware test (Floating point instructions)
        run: build/m33mu tests/firmware/test-fpu-instructions/app.bin --uart-stdout --expect-bkpt 0x7f --timeout 60 --quit-on-faults
      - name: Run RTOS exception firmware test
        run: build/m33mu tests/firmware/test-rtos-exceptions/app.bin --expect-bkpt 0x0 --timeout 60 --quit-on-faults
