name: test-firmware

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libtpms-dev vde2 libcapstone-dev libwolfssl-dev libvdeplug-dev vde-switch libdw-dev libelf-dev
          sudo apt-get install -y gcc-arm-none-eabi
      - name: Configure
        run: cmake -S . -B build
      - name: Build m33mu
        run: cmake --build build
      - name: Fetch wolfSSL source tree for firmware build
        # The firmware Makefile (tests/firmware/test-stm32h563-wolfssl-iotsafe
        # and test-stm32u585-wolfssl-pka) compiles wolfSSL .c sources directly
        # with arm-none-eabi-gcc and expects a sibling checkout at
        # WOLFSSL_ROOT=../../../../wolfssl.
        # Track master rather than v5.9.1-stable to pick up post-5.9.1 SP-int
        # bug fixes (notably c119a2193 "SP int: fixes from review by Claude"
        # — fixes sp_mod_2d uninit-read and negation-loop OOB that triggered
        # the sp_256_rshift1_9 MemFault on CI). Re-pin to a tagged release
        # once one ships including these fixes.
        working-directory: ..
        run: git clone --depth 1 --branch master https://github.com/wolfSSL/wolfssl.git
      - name: Build firmware
        run: cmake --build build --target firmware-build
      - name: Run STM32H5 firmware test (SPI peripherals selection)
        run: build/m33mu tests/firmware/test-stm32h563/app.bin --spiflash:SPI1:file=/tmp/flash.bin:size=4096:mmap=0x60000000:cs=PB0 --tpm:SPI1:cs=PB1 --uart-stdout --expect-bkpt 0x7f --timeout 60 --quit-on-faults
      - name: Run STM32H5 dual-bank firmware test
        run: build/m33mu tests/firmware/test-stm32h563-dualbank/app.bin --dualbank --expect-bkpt 0x7f --timeout 60 --uart-stdout --quit-on-faults
      # NOTE: The STM32H5 wolfSSL IoTSAFE mTLS firmware test is
      # intentionally NOT run in CI. It performs a full TLS 1.2 handshake
      # under emulated Cortex-M33 with software P-256/AES-GCM and exhibits
      # a data-dependent crash (sp_256_mul_9 / sp_256_rshift1_9 -> wild
      # pointer -> MemFault at RAM_base - 4) 
      #   rm -f /tmp/m33mu-iotsafe-sim.bin
      #   build/m33mu --cpu stm32h563 --uart-stdout --expect-bkpt 0x42 \
      #     --timeout 60 --quit-on-faults \
      #     --iotsafe-uart:0x40004800:file=/tmp/m33mu-iotsafe-sim.bin \
      #     tests/firmware/test-stm32h563-wolfssl-iotsafe/app.bin
      # Re-enable once fixed.

      - name: Run STM32U5 firmware test (SPI peripherals selection)
        run: build/m33mu  tests/firmware/test-stm32u585/app.bin --spiflash:SPI1:file=/tmp/flash.bin:size=4096:mmap=0x60000000:cs=PB0 --tpm:SPI1:cs=PB1 --expect-bkpt 0x7f --timeout 60 --uart-stdout --cpu stm32u585 --quit-on-faults
      - name: Run STM32L5 firmware test (SPI peripherals selection)
        run: build/m33mu  tests/firmware/test-stm32l552/app.bin --spiflash:SPI1:file=/tmp/flash.bin:size=4096:mmap=0x60000000:cs=PB0 --tpm:SPI1:cs=PB1 --expect-bkpt 0x7f --timeout 60 --uart-stdout --cpu stm32l552 --quit-on-faults
      - name: Run nRF5340 firmware test (SPI flash read/write)
        run: build/m33mu  tests/firmware/test-nrf5340/app.bin --spiflash:SPI0:file=/tmp/flash.bin:size=4096:mmap=0x60000000:cs=PB0 --expect-bkpt 0x7f --timeout 60 --uart-stdout --cpu nrf5340 --quit-on-faults
      - name: Run nRF54LM20 firmware test
        run: build/m33mu  tests/firmware/test-nrf54lm20/app.bin --expect-bkpt 0x7f --timeout 60 --uart-stdout --cpu nrf54lm20 --quit-on-faults
      - name: Run STM32H5 firmware test (Floating point instructions)
        run: build/m33mu tests/firmware/test-fpu-instructions/app.bin --uart-stdout --expect-bkpt 0x7f --timeout 60 --quit-on-faults
      - name: Run RTOS exception firmware test
        run: build/m33mu tests/firmware/test-rtos-exceptions/app.bin --expect-bkpt 0x0 --timeout 60 --quit-on-faults
      - name: Run LPC55S69 HashCrypt firmware test
        run: |
          set -euo pipefail
          build/m33mu \
            --cpu lpc55s69 \
            --uart-stdout \
            --expect-bkpt 0x42 \
            --timeout 30 \
            --quit-on-faults \
            tests/firmware/test-lpc55s69-hashcrypt/app.bin | tee /tmp/m33mu-hashcrypt.log
          grep -q "HASHCRYPT TEST SUCCESSFUL" /tmp/m33mu-hashcrypt.log
      - name: Run STM32U585 OTFDEC firmware test
        run: |
          set -euo pipefail
          python3 tests/firmware/test-stm32u585-otfdec/gen_blob.py \
            tests/firmware/test-stm32u585-otfdec/spi_flash.bin
          build/m33mu \
            --cpu stm32u585 \
            --uart-stdout \
            --expect-bkpt 0x42 \
            --timeout 30 \
            --quit-on-faults \
            --spiflash:SPI1:file=tests/firmware/test-stm32u585-otfdec/spi_flash.bin:size=4096:mmap=0x60000000:cs=PB0 \
            tests/firmware/test-stm32u585-otfdec/app.bin | tee /tmp/m33mu-otfdec.log
          grep -q "OTFDEC TEST SUCCESSFUL" /tmp/m33mu-otfdec.log
      - name: Run LPC55S69 CASPER firmware test
        run: |
          set -euo pipefail
          build/m33mu \
            --cpu lpc55s69 \
            --uart-stdout \
            --expect-bkpt 0x42 \
            --timeout 30 \
            --quit-on-faults \
            tests/firmware/test-lpc55s69-casper/app.bin | tee /tmp/m33mu-casper.log
          grep -q "CASPER TEST SUCCESSFUL" /tmp/m33mu-casper.log
      - name: Run nRF5340 CryptoCell firmware test
        run: |
          set -euo pipefail
          build/m33mu \
            --cpu nrf5340 \
            --uart-stdout \
            --expect-bkpt 0x42 \
            --timeout 30 \
            --quit-on-faults \
            tests/firmware/test-nrf5340-cryptocell/app.bin | tee /tmp/m33mu-cc312.log
          grep -q "CRYPTOCELL TEST SUCCESSFUL" /tmp/m33mu-cc312.log
      - name: Run STM32U585 wolfSSL PKA ECDSA firmware test
        # Drives wolfSSL's WOLFSSL_STM32_PKA backend through ECDSA P-256
        # sign + verify; the host-side PKA peripheral uses only public
        # wolfSSL APIs (wc_ecc_mulmod, mp_*) so distro libwolfssl-dev is
        # sufficient — no custom wolfssl build required.
        run: |
          set -euo pipefail
          build/m33mu \
            --cpu stm32u585 \
            --uart-stdout \
            --expect-bkpt 0x42 \
            --timeout 60 \
            --quit-on-faults \
            tests/firmware/test-stm32u585-wolfssl-pka/app.bin | tee /tmp/m33mu-pka.log
          grep -q "PKA TEST SUCCESSFUL" /tmp/m33mu-pka.log
