name: ctest-build-all-deps

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  ctest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libtpms-dev vde2 libcapstone-dev libwolfssl-dev libvdeplug-dev vde-switch libdw-dev libelf-dev
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build
