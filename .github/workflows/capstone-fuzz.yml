name: capstone-fuzz

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  capstone-fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libtpms-dev vde2 libcapstone-dev libwolfssl-dev libvdeplug-dev vde-switch libdw-dev libelf-dev

      - name: Configure
        run: cmake -S . -B build

      - name: Build m33mu and capstone fuzz target
        run: cmake --build build --target m33mu decode_capstone_fuzz_full32_test

      - name: Run capstone split fuzz
        run: scripts/run_capstone_fuzz_split.sh

      - name: Upload fuzz logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: capstone-fuzz-logs
          path: build/fuzz-logs
          if-no-files-found: ignore
